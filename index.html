<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Model Viewer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Inter', sans-serif;
      color: #e0e0e0;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Loading overlay */
    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loader-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #7c5cfc;
      border-right-color: #5c9cfc;
      animation: spin 1.2s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
      position: relative;
    }

    .loader-ring::before {
      content: '';
      position: absolute;
      top: 4px;
      left: 4px;
      right: 4px;
      bottom: 4px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #fc5c8a;
      border-left-color: #fcac5c;
      animation: spin 0.8s linear infinite reverse;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 24px;
      font-size: 14px;
      font-weight: 400;
      color: #888;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .loading-progress {
      margin-top: 12px;
      font-size: 28px;
      font-weight: 600;
      background: linear-gradient(135deg, #7c5cfc, #5c9cfc, #fc5c8a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .error-details {
      margin-top: 20px;
      padding: 12px 18px;
      background: rgba(252, 92, 138, 0.1);
      border: 1px solid rgba(252, 92, 138, 0.3);
      border-radius: 8px;
      color: #fc5c8a;
      font-family: monospace;
      font-size: 11px;
      max-width: 80%;
      word-break: break-all;
      white-space: pre-wrap;
      text-align: left;
      display: none;
      max-height: 200px;
      overflow-y: auto;
    }

    /* Top bar */
    #top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: rgba(10, 10, 15, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(124, 92, 252, 0.15);
      z-index: 100;
      opacity: 0;
      transform: translateY(-10px);
      transition: opacity 0.5s ease 0.3s, transform 0.5s ease 0.3s;
    }

    #top-bar.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #7c5cfc, #5c9cfc);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 600;
      color: #e0e0e0;
    }

    .model-name {
      font-size: 13px;
      font-weight: 400;
      color: #666;
      padding: 6px 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
    }

    /* Controls hint */
    #controls-hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      display: flex;
      gap: 16px;
      padding: 10px 20px;
      background: rgba(10, 10, 15, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(124, 92, 252, 0.15);
      border-radius: 14px;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.5s ease 0.6s, transform 0.5s ease 0.6s;
    }

    #controls-hint.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .hint-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #777;
    }

    .hint-key {
      padding: 3px 8px;
      background: rgba(124, 92, 252, 0.12);
      border: 1px solid rgba(124, 92, 252, 0.25);
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      color: #a99cfc;
    }

    /* Toolbar */
    #toolbar {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%) translateX(10px);
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px;
      background: rgba(10, 10, 15, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(124, 92, 252, 0.15);
      border-radius: 14px;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.5s ease 0.5s, transform 0.5s ease 0.5s;
    }

    #toolbar.visible {
      opacity: 1;
      transform: translateY(-50%) translateX(0);
    }

    .toolbar-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: transparent;
      color: #888;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      font-size: 18px;
    }

    .toolbar-btn:hover {
      background: rgba(124, 92, 252, 0.15);
      color: #b8a8fc;
    }

    .toolbar-btn.active {
      background: rgba(124, 92, 252, 0.2);
      color: #7c5cfc;
    }

    .toolbar-divider {
      width: 24px;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      margin: 4px auto;
    }

    /* Background gradient orbs */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      pointer-events: none;
      z-index: -1;
    }

    .bg-orb-1 {
      width: 500px;
      height: 500px;
      background: #7c5cfc;
      top: -150px;
      left: -100px;
    }

    .bg-orb-2 {
      width: 400px;
      height: 400px;
      background: #fc5c8a;
      bottom: -100px;
      right: -50px;
    }

    .bg-orb-3 {
      width: 300px;
      height: 300px;
      background: #5c9cfc;
      top: 50%;
      left: 60%;
    }
  </style>
</head>
<body>

  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <!-- Loading overlay -->
  <div id="loading-overlay">
    <div class="loader-ring"></div>
    <div class="loading-text">Loading model</div>
    <div class="loading-progress" id="loading-progress">0%</div>
    <div class="error-details" id="error-details"></div>
  </div>

  <!-- Top bar -->
  <div id="top-bar">
    <div class="logo">
      <div class="logo-icon">3D</div>
      <span class="logo-text">Model Viewer</span>
    </div>
    <div class="model-name">robot.glb</div>
  </div>

  <!-- Right toolbar -->
  <div id="toolbar">
    <button class="toolbar-btn" id="btn-reset" title="Reset camera">⟲</button>
    <button class="toolbar-btn" id="btn-autorotate" title="Auto-rotate" >↻</button>
    <div class="toolbar-divider"></div>
    <button class="toolbar-btn" id="btn-grid" title="Toggle grid">▦</button>
  </div>

  <!-- Controls hint -->
  <div id="controls-hint">
    <div class="hint-item">
      <span class="hint-key">LMB</span> Rotate
    </div>
    <div class="hint-item">
      <span class="hint-key">RMB</span> Pan
    </div>
    <div class="hint-item">
      <span class="hint-key">Scroll</span> Zoom
    </div>
  </div>

  <div id="canvas-container"></div>

  <!-- Three.js + GLTFLoader via importmap -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

    // --- Scene setup ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
    camera.position.set(0, 1.5, 4);

    // --- Mobile Optimization check ---
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

    const renderer = new THREE.WebGLRenderer({ antialias: !isMobile, alpha: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(isMobile ? 1 : Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = !isMobile;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    // --- Controls ---
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.autoRotate = false;
    controls.autoRotateSpeed = 2.0;
    controls.minDistance = 0.5;
    controls.maxDistance = 50;
    controls.target.set(0, 0, 0);

    // --- Lighting ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 2.5);
    dirLight.position.set(5, 8, 5);
    dirLight.castShadow = !isMobile;
    dirLight.shadow.mapSize.width = 1024; // reduced from 2048 for better mobile perf
    dirLight.shadow.mapSize.height = 1024;
    dirLight.shadow.camera.near = 0.1;
    dirLight.shadow.camera.far = 50;
    dirLight.shadow.camera.left = -10;
    dirLight.shadow.camera.right = 10;
    dirLight.shadow.camera.top = 10;
    dirLight.shadow.camera.bottom = -10;
    scene.add(dirLight);

    const fillLight = new THREE.DirectionalLight(0x8888ff, 0.8);
    fillLight.position.set(-3, 2, -4);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0xff8866, 0.6);
    rimLight.position.set(0, 3, -6);
    scene.add(rimLight);

    // Hemisphere light for natural ambient
    const hemiLight = new THREE.HemisphereLight(0x7c5cfc, 0x1a1a2e, 0.4);
    scene.add(hemiLight);

    // --- Ground grid ---
    const gridHelper = new THREE.GridHelper(20, 40, 0x333355, 0x222244);
    gridHelper.material.opacity = 0.3;
    gridHelper.material.transparent = true;
    scene.add(gridHelper);

    // Ground plane for shadow catching
    const groundGeo = new THREE.PlaneGeometry(40, 40);
    const groundMat = new THREE.ShadowMaterial({ opacity: 0.3 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.01;
    ground.receiveShadow = true;
    scene.add(ground);

    // --- Environment (simple gradient) ---
    const envScene = new THREE.Scene();
    const envGeo = new THREE.SphereGeometry(50, 32, 32);
    const envMat = new THREE.ShaderMaterial({
      side: THREE.BackSide,
      uniforms: {
        topColor: { value: new THREE.Color(0x0a0a1a) },
        bottomColor: { value: new THREE.Color(0x0a0a0f) },
        offset: { value: 10 },
        exponent: { value: 0.4 }
      },
      vertexShader: `
        varying vec3 vWorldPosition;
        void main() {
          vec4 worldPos = modelMatrix * vec4(position, 1.0);
          vWorldPosition = worldPos.xyz;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform vec3 topColor;
        uniform vec3 bottomColor;
        uniform float offset;
        uniform float exponent;
        varying vec3 vWorldPosition;
        void main() {
          float h = normalize(vWorldPosition + offset).y;
          gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h, 0.0), exponent), 0.0)), 1.0);
        }
      `
    });
    scene.add(new THREE.Mesh(envGeo, envMat));

    // --- Load model ---
    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');

    const loader = new GLTFLoader();
    loader.setDRACOLoader(dracoLoader);

    let model = null;
    let mixer = null;

    const progressEl = document.getElementById('loading-progress');
    const loadingOverlay = document.getElementById('loading-overlay');

    loader.load(
      './robot.glb',
      (gltf) => {
        model = gltf.scene;

        // Enable shadows on all meshes (only if not mobile)
        model.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = !isMobile;
            child.receiveShadow = !isMobile;
          }
        });

        // Center and fit the model
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());

        model.position.sub(center);
        model.position.y += size.y / 2;

        const maxDim = Math.max(size.x, size.y, size.z);
        const fov = camera.fov * (Math.PI / 180);
        let cameraDistance = maxDim / (2 * Math.tan(fov / 2));
        cameraDistance *= 1.8;

        camera.position.set(
          cameraDistance * 0.6,
          cameraDistance * 0.4,
          cameraDistance * 0.8
        );
        camera.near = cameraDistance / 100;
        camera.far = cameraDistance * 100;
        camera.updateProjectionMatrix();

        controls.target.set(0, size.y / 2, 0);
        controls.minDistance = cameraDistance * 0.2;
        controls.maxDistance = cameraDistance * 5;
        controls.update();

        // Save initial camera state for reset button
        initialCameraPos = camera.position.clone();
        initialTarget = controls.target.clone();

        // Update shadow camera
        const shadowSize = maxDim * 1.5;
        dirLight.shadow.camera.left = -shadowSize;
        dirLight.shadow.camera.right = shadowSize;
        dirLight.shadow.camera.top = shadowSize;
        dirLight.shadow.camera.bottom = -shadowSize;
        dirLight.shadow.camera.far = cameraDistance * 5;
        dirLight.shadow.camera.updateProjectionMatrix();
        dirLight.position.set(cameraDistance, cameraDistance * 1.5, cameraDistance);

        // Animations
        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(model);
          gltf.animations.forEach((clip) => {
            mixer.clipAction(clip).play();
          });
        }

        scene.add(model);

        // Hide loading
        loadingOverlay.classList.add('hidden');

        // Show UI
        setTimeout(() => {
          document.getElementById('top-bar').classList.add('visible');
          document.getElementById('toolbar').classList.add('visible');
          document.getElementById('controls-hint').classList.add('visible');
        }, 200);

        // Auto-hide hints after 5 seconds
        setTimeout(() => {
          const hint = document.getElementById('controls-hint');
          hint.style.transition = 'opacity 1s ease, transform 1s ease';
          hint.style.opacity = '0';
          hint.style.transform = 'translateX(-50%) translateY(10px)';
        }, 7000);
      },
      (progress) => {
        if (progress.total > 0) {
          const pct = Math.round((progress.loaded / progress.total) * 100);
          progressEl.textContent = pct + '%';
        }
      },
      (error) => {
        console.error('Error loading model:', error);
        
        // Stop spinning and hide loader ring
        const ring = document.querySelector('.loader-ring');
        if (ring) ring.style.display = 'none';

        progressEl.textContent = '❌';
        
        const loaderText = document.querySelector('.loading-text');
        if (loaderText) {
          loaderText.textContent = 'Failed to load model';
          loaderText.style.color = '#fc5c8a';
        }

        const errDetails = document.getElementById('error-details');
        if (errDetails) {
          errDetails.style.display = 'block';
          
          let detailsMsg = 'Error Details:\n';
          if (error) {
            if (typeof error === 'string') {
              detailsMsg += error;
            } else {
              if (error.name) detailsMsg += `Name: ${error.name}\n`;
              if (error.message) detailsMsg += `Message: ${error.message}\n`;
              if (error.stack) detailsMsg += `Stack: ${error.stack}\n`;
              if (error.type) detailsMsg += `Event Type: ${error.type}\n`;
              
              if (error.target) {
                detailsMsg += `Target: ${error.target.constructor.name}\n`;
                if (error.target.src) detailsMsg += `Source: ${error.target.src}\n`;
                if (error.target.status) detailsMsg += `HTTP Status: ${error.target.status} ${error.target.statusText || ''}\n`;
                if (error.target.responseURL) detailsMsg += `Response URL: ${error.target.responseURL}\n`;
              }
              
              try {
                const serialized = JSON.stringify(error, Object.getOwnPropertyNames(error), 2);
                if (serialized && serialized !== '{}') {
                  detailsMsg += `\nFull Dump:\n${serialized}`;
                }
              } catch (e) {
                detailsMsg += `\n(Serialization failed: ${e.message})`;
              }
            }
          } else {
            detailsMsg += 'An unknown error occurred while loading the model.';
          }
          errDetails.textContent = detailsMsg;
        }
      }
    );

    // --- Toolbar buttons ---
    const btnReset = document.getElementById('btn-reset');
    const btnAutorotate = document.getElementById('btn-autorotate');
    const btnGrid = document.getElementById('btn-grid');

    let initialCameraPos = null;
    let initialTarget = null;

    btnReset.addEventListener('click', () => {
      if (initialCameraPos) {
        camera.position.copy(initialCameraPos);
        controls.target.copy(initialTarget);
        controls.update();
      }
    });

    btnAutorotate.addEventListener('click', () => {
      controls.autoRotate = !controls.autoRotate;
      btnAutorotate.classList.toggle('active', controls.autoRotate);
    });

    let gridOn = true;
    btnGrid.addEventListener('click', () => {
      gridOn = !gridOn;
      btnGrid.classList.toggle('active', !gridOn);
      gridHelper.visible = gridOn;
      ground.visible = gridOn;
    });

    // --- Animation loop ---
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      if (mixer) mixer.update(delta);
      controls.update();



      renderer.render(scene, camera);
    }

    animate();

    // --- Resize ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
